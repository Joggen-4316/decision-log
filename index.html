<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="决策日志">
<title>决策日志</title>
<style>
  :root{
    --bg:#f4f1ea; --paper:#fbfaf6; --ink:#23211c; --ink-soft:#6b675d;
    --ink-faint:#a8a397; --line:#e3ddd0; --accent:#9a5b34; --accent-soft:#c98a5c;
    --good:#5c7a52; --shadow:0 1px 2px rgba(35,33,28,.04),0 8px 24px rgba(35,33,28,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.6;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:24px 20px 120px;}
  header{margin-bottom:16px;}
  .title{font-size:15px;letter-spacing:.18em;color:var(--ink-soft);font-weight:600;text-transform:uppercase;margin:0;}
  .subtitle{font-size:13px;color:var(--ink-faint);margin:4px 0 0;letter-spacing:.02em;}

  .tabs{display:flex;gap:6px;margin:16px 0 18px;background:rgba(35,33,28,.04);padding:4px;border-radius:12px;}
  .tabs button{flex:1;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-faint);padding:9px 0;border-radius:9px;cursor:pointer;letter-spacing:.04em;transition:all .15s;}
  .tabs button.on{background:var(--paper);color:var(--ink);box-shadow:var(--shadow);}

  .view{display:none;} .view.on{display:block;}

  /* capture — 极简：只有一个大输入框 + 存下 */
  .capture{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px 18px 16px;box-shadow:var(--shadow);margin-bottom:14px;}
  .capture-label{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-soft);}
  textarea.seed{width:100%;border:none;background:transparent;resize:none;font-family:inherit;font-size:18px;line-height:1.6;color:var(--ink);outline:none;min-height:120px;padding:0;}
  textarea.seed::placeholder{color:var(--ink-faint);}
  .capture-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
  .hint{font-size:11.5px;color:var(--ink-faint);max-width:62%;line-height:1.5;}
  button.save{border:none;background:var(--ink);color:var(--paper);font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.05em;padding:11px 26px;border-radius:10px;cursor:pointer;transition:transform .12s,opacity .12s;}
  button.save:active{transform:scale(.96);}
  button.save:disabled{opacity:.35;cursor:default;}

  .strip{display:flex;gap:10px;margin:18px 2px 10px;}
  .stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 12px;text-align:center;}
  .stat .num{font-size:22px;font-weight:700;color:var(--ink);line-height:1;}
  .stat .lbl{font-size:11px;color:var(--ink-faint);margin-top:5px;letter-spacing:.04em;}

  .list-head{display:flex;justify-content:space-between;align-items:baseline;margin:24px 2px 12px;}
  .list-head h2{font-size:13px;letter-spacing:.12em;color:var(--ink-soft);font-weight:600;margin:0;text-transform:uppercase;}
  .list-head .count{font-size:12px;color:var(--ink-faint);}
  .empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:46px 20px;border:1px dashed var(--line);border-radius:14px;line-height:1.8;}

  .item{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;box-shadow:var(--shadow);}
  .item .when{font-size:11.5px;color:var(--ink-faint);letter-spacing:.03em;margin-bottom:6px;}
  .item .seed-text{font-size:16px;color:var(--ink);line-height:1.6;white-space:pre-wrap;}
  .item .meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .tag{font-size:11px;padding:3px 9px;border-radius:20px;letter-spacing:.02em;}
  .tag.pending{background:rgba(201,138,92,.16);color:var(--accent);}
  .tag.done{background:rgba(92,122,82,.16);color:var(--good);}
  .tag.cat{background:rgba(35,33,28,.06);color:var(--ink-soft);}
  .tag.size-小{background:rgba(168,163,151,.18);color:var(--ink-soft);}
  .tag.size-中{background:rgba(201,138,92,.16);color:var(--accent);}
  .tag.size-大{background:rgba(154,91,52,.18);color:var(--accent);font-weight:600;}
  .item .actions{display:flex;gap:16px;margin-top:11px;}
  .item .actions button{border:none;background:none;font-family:inherit;font-size:13px;color:var(--accent);cursor:pointer;padding:0;letter-spacing:.03em;}
  .item .actions button.del{color:var(--ink-faint);margin-left:auto;}
  .review-block{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .review-block .qa{margin-bottom:8px;}
  .review-block .q{font-size:11.5px;color:var(--ink-faint);}
  .review-block .a{font-size:14px;color:var(--ink-soft);line-height:1.55;white-space:pre-wrap;}
  .review-block .result{background:rgba(92,122,82,.08);border-left:2px solid var(--good);padding:8px 11px;border-radius:0 8px 8px 0;}
  .review-block .result .a{color:#46603d;}
  .review-block .principle{background:rgba(154,91,52,.07);border-left:2px solid var(--accent-soft);padding:8px 11px;border-radius:0 8px 8px 0;}
  .review-block .principle .a{color:var(--accent);}

  .pintro{font-size:13px;color:var(--ink-soft);line-height:1.7;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .pcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px 14px;margin-bottom:11px;box-shadow:var(--shadow);position:relative;}
  .pcard .pnum{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.1em;margin-bottom:6px;}
  .pcard .ptext{font-size:15.5px;color:var(--ink);line-height:1.55;white-space:pre-wrap;}
  .pcard .pfrom{font-size:11px;color:var(--ink-faint);margin-top:8px;}
  .pcard .pdel{position:absolute;top:13px;right:14px;border:none;background:none;color:var(--ink-faint);font-size:12px;cursor:pointer;}

  .overlay{position:fixed;inset:0;background:rgba(35,33,28,.34);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
  .overlay.show{display:flex;}
  .sheet{background:var(--paper);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(35,33,28,.2);animation:rise .26s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet h3{font-size:16px;margin:0 0 4px;color:var(--ink);}
  .sheet .sub{font-size:12.5px;color:var(--ink-faint);margin:0 0 18px;line-height:1.5;white-space:pre-wrap;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;color:var(--ink);font-weight:600;margin-bottom:6px;}
  .field .desc{font-size:11.5px;color:var(--ink-faint);font-weight:400;display:block;margin-bottom:7px;line-height:1.5;}
  .field textarea,.field input{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:14.5px;color:var(--ink);outline:none;padding:10px 12px;resize:none;line-height:1.55;}
  .field textarea:focus,.field input:focus{border-color:var(--accent-soft);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{border:1px solid var(--line);background:#fff;font-family:inherit;font-size:12.5px;color:var(--ink-soft);padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .12s;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip.size.on{background:var(--ink);border-color:var(--ink);}
  .seg{display:flex;gap:7px;}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;font-family:inherit;font-size:13px;color:var(--ink-soft);padding:9px 0;border-radius:9px;cursor:pointer;transition:all .12s;}
  .seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .score-row{display:flex;gap:6px;}
  .score-row button{flex:1;border:1px solid var(--line);background:#fff;font-family:inherit;font-size:15px;color:var(--ink-soft);padding:9px 0;border-radius:9px;cursor:pointer;font-weight:600;}
  .score-row button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .result-field{background:rgba(92,122,82,.07);border-radius:12px;padding:13px 14px;margin-bottom:16px;}
  .result-field label{color:#46603d;}
  .principle-field{background:rgba(154,91,52,.06);border-radius:12px;padding:13px 14px;margin-bottom:16px;}
  .principle-field label{color:var(--accent);}
  .sheet-foot{display:flex;gap:10px;margin-top:8px;}
  .sheet-foot button{flex:1;font-family:inherit;font-size:14px;font-weight:600;padding:12px 0;border-radius:11px;cursor:pointer;border:none;}
  .btn-cancel{background:rgba(35,33,28,.06);color:var(--ink-soft);}
  .btn-save{background:var(--ink);color:var(--paper);}

  footer{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:30px;line-height:1.7;}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);font-size:13px;padding:10px 20px;border-radius:24px;opacity:0;transition:all .3s;z-index:80;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="title">决策日志</p>
    <p class="subtitle">练的是过程，不是结果 · 第一门课：决策</p>
  </header>

  <div class="tabs">
    <button class="on" data-view="log">记录</button>
    <button data-view="principles">我的原则</button>
  </div>

  <!-- ====== 记录 ====== -->
  <div class="view on" id="view-log">
    <div class="capture">
      <div class="capture-label"><span class="dot"></span>此刻 · 趁热说出来</div>
      <textarea class="seed" id="seedInput" placeholder="把这件事说出来——我遇到的问题是什么、我打算怎么做、为什么这么定，甚至已经知道的结果，想说多少说多少。

（点这里，再按键盘上的麦克风键，直接说）"></textarea>
      <div class="capture-foot">
        <span class="hint">现在只管记。分类、复盘、打分这些，都留到有空时再补。</span>
        <button class="save" id="saveBtn" disabled>存下</button>
      </div>
    </div>

    <div class="strip">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">已记录</div></div>
      <div class="stat"><div class="num" id="statPending">0</div><div class="lbl">待复盘</div></div>
      <div class="stat"><div class="num" id="statStreak">0</div><div class="lbl">连续天数</div></div>
    </div>

    <div class="list-head"><h2>回看</h2><span class="count" id="listCount"></span></div>
    <div id="list"></div>
  </div>

  <!-- ====== 原则库 ====== -->
  <div class="view" id="view-principles">
    <div class="pintro">
      这是这个工具<b>最值钱的一页</b>。<br>
      日志只是过程，沉淀出你自己的决策原则才是结果。<br>
      复盘时若有所悟，就记下一条你以后能反复用的话。<br>
      攒够十几条，这就是<b>只属于你的决策模型</b>。
    </div>
    <div id="principleList"></div>
  </div>

  <footer>
    数据只存在你这台设备的浏览器里 · 不上传任何地方<br>
    已添加到主屏幕 · 点图标即可快速记录
  </footer>
</div>

<!-- 复盘弹层 -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <h3>复盘 / 补充</h3>
    <p class="sub" id="sheetSeed"></p>

    <div class="field">
      <label>这是哪一类、多大的决策？
        <span class="desc">现在有空了，给它归个类。攒久了能看出你在哪类决策上最弱。</span>
      </label>
      <div class="pick-label" style="font-size:11.5px;color:var(--ink-faint);margin-bottom:6px;">重要性</div>
      <div class="chips" id="sizeChips" style="margin-bottom:10px;">
        <span class="chip size" data-size="小">小决策</span>
        <span class="chip size" data-size="中">中决策</span>
        <span class="chip size" data-size="大">大决策</span>
      </div>
      <div class="pick-label" style="font-size:11.5px;color:var(--ink-faint);margin-bottom:6px;">类型</div>
      <div class="chips" id="catChips">
        <span class="chip cat-chip" data-cat="工作">工作</span>
        <span class="chip cat-chip" data-cat="用人">用人</span>
        <span class="chip cat-chip" data-cat="投资">投资</span>
        <span class="chip cat-chip" data-cat="家庭">家庭</span>
        <span class="chip cat-chip" data-cat="关系">关系</span>
        <span class="chip cat-chip" data-cat="消费">消费</span>
        <span class="chip cat-chip" data-cat="时间分配">时间分配</span>
      </div>
    </div>

    <div class="field">
      <label>我当时的判断依据是什么？
        <span class="desc">我为什么这么定？依据是数据、经验、还是直觉？诚实点。</span>
      </label>
      <textarea id="rHow" rows="2" placeholder="我这么决定，是基于……"></textarea>
    </div>

    <div class="field">
      <label>我否决了哪些其他做法？为什么？
        <span class="desc">放弃的选项里最好的那个，才是真正的代价 —— 机会成本。</span>
      </label>
      <textarea id="rOpp" rows="2" placeholder="我本来还可以……但没选，因为……"></textarea>
    </div>

    <div class="field">
      <label>这个决策可逆吗？最坏能不能扛？
        <span class="desc">可逆的快点定，不可逆的慢慢想。最坏能扛，就敢做。</span>
      </label>
      <div class="seg" id="segReversible" style="margin-bottom:8px;">
        <button data-v="可逆">可逆</button>
        <button data-v="半可逆">半可逆</button>
        <button data-v="不可逆">不可逆</button>
      </div>
      <textarea id="rWorst" rows="2" placeholder="最坏情况是……我（能/不能）承受"></textarea>
    </div>

    <div class="field">
      <label>「过程质量」打分
        <span class="desc">打的不是结果好不好，是过程对不对。好过程也可能撞上坏运气。</span>
      </label>
      <div class="score-row" id="scoreRow">
        <button data-s="1">1</button><button data-s="2">2</button>
        <button data-s="3">3</button><button data-s="4">4</button><button data-s="5">5</button>
      </div>
    </div>

    <div class="result-field">
      <label>结果如何？
        <span class="desc">过几天/几周回来填。这一栏让「决策 → 结果」形成闭环，是可追溯成长的关键。</span>
      </label>
      <textarea id="rResult" rows="2" placeholder="后来的结果是……（现在不知道也没关系，以后回来补）"></textarea>
    </div>

    <div class="principle-field">
      <label>能沉淀出一条「决策原则」吗？
        <span class="desc">可选，但这是最有价值的一步。一句你以后能反复用的话。<br>比如：凡只因为「不想麻烦」而选某方案时，先警惕这是逃避成本。</span>
      </label>
      <textarea id="rPrinciple" rows="2" placeholder="我学到的一条原则是……（写了会进「我的原则」）"></textarea>
    </div>

    <div class="sheet-foot">
      <button class="btn-cancel" id="cancelReview">先不弄</button>
      <button class="btn-save" id="submitReview">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='decision_log_v1', PKEY='decision_principles_v1';
let data=load(KEY), principles=load(PKEY);
let reviewingId=null, segVal='', scoreVal=0, pickSize='', pickCat='';

function load(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveAll(){try{localStorage.setItem(KEY,JSON.stringify(data));localStorage.setItem(PKEY,JSON.stringify(principles));}catch(e){toast('保存失败，存储可能已满');}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(ts){const d=new Date(ts),now=new Date();const sd=d.toDateString()===now.toDateString();const y=new Date(now-86400000).toDateString()===d.toDateString();const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');if(sd)return '今天 '+hh+':'+mm;if(y)return '昨天 '+hh+':'+mm;return (d.getMonth()+1)+'月'+d.getDate()+'日 '+hh+':'+mm;}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function streak(){if(!data.length)return 0;const days=new Set(data.map(d=>dayKey(d.ts)));let s=0;const cur=new Date();for(;;){const k=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();if(days.has(k)){s++;cur.setDate(cur.getDate()-1);}else break;}if(s===0){const yk=new Date(Date.now()-86400000);const k=yk.getFullYear()+'-'+yk.getMonth()+'-'+yk.getDate();if(days.has(k)){let c2=yk;for(;;){const kk=c2.getFullYear()+'-'+c2.getMonth()+'-'+c2.getDate();if(days.has(kk)){s++;c2.setDate(c2.getDate()-1);}else break;}}}return s;}

const seedInput=document.getElementById('seedInput');
const saveBtn=document.getElementById('saveBtn');
seedInput.addEventListener('input',()=>{saveBtn.disabled=seedInput.value.trim()==='';seedInput.style.height='auto';seedInput.style.height=Math.max(120,seedInput.scrollHeight)+'px';});

saveBtn.addEventListener('click',()=>{
  const txt=seedInput.value.trim();if(!txt)return;
  data.unshift({id:uid(),ts:Date.now(),seed:txt,size:'',cat:'',reviewed:false,review:null});
  saveAll();render();
  seedInput.value='';seedInput.style.height='120px';saveBtn.disabled=true;seedInput.blur();
  toast('记下了 · 有空再回来复盘');
});

document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+b.dataset.view).classList.add('on');
}));

function openReview(id){
  reviewingId=id;const item=data.find(d=>d.id===id);
  document.getElementById('sheetSeed').textContent=item.seed;
  const r=item.review||{};
  document.getElementById('rHow').value=r.how||'';
  document.getElementById('rOpp').value=r.opp||'';
  document.getElementById('rWorst').value=r.worst||'';
  document.getElementById('rResult').value=r.result||'';
  document.getElementById('rPrinciple').value='';
  segVal=r.reversible||'';scoreVal=r.score||0;pickSize=item.size||'';pickCat=item.cat||'';
  document.querySelectorAll('#sizeChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.size===pickSize));
  document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.cat===pickCat));
  document.querySelectorAll('#segReversible button').forEach(b=>b.classList.toggle('on',b.dataset.v===segVal));
  document.querySelectorAll('#scoreRow button').forEach(b=>b.classList.toggle('on',+b.dataset.s===scoreVal));
  document.getElementById('overlay').classList.add('show');
}
function closeReview(){document.getElementById('overlay').classList.remove('show');reviewingId=null;}

document.querySelectorAll('#sizeChips .chip').forEach(c=>c.addEventListener('click',()=>{const v=c.dataset.size;pickSize=(pickSize===v)?'':v;document.querySelectorAll('#sizeChips .chip').forEach(x=>x.classList.toggle('on',x.dataset.size===pickSize));}));
document.querySelectorAll('#catChips .chip').forEach(c=>c.addEventListener('click',()=>{const v=c.dataset.cat;pickCat=(pickCat===v)?'':v;document.querySelectorAll('#catChips .chip').forEach(x=>x.classList.toggle('on',x.dataset.cat===pickCat));}));
document.querySelectorAll('#segReversible button').forEach(b=>b.addEventListener('click',()=>{segVal=b.dataset.v;document.querySelectorAll('#segReversible button').forEach(x=>x.classList.toggle('on',x===b));}));
document.querySelectorAll('#scoreRow button').forEach(b=>b.addEventListener('click',()=>{scoreVal=+b.dataset.s;document.querySelectorAll('#scoreRow button').forEach(x=>x.classList.toggle('on',x===b));}));
document.getElementById('cancelReview').addEventListener('click',closeReview);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeReview();});

document.getElementById('submitReview').addEventListener('click',()=>{
  const item=data.find(d=>d.id===reviewingId);if(!item)return;
  const pTxt=document.getElementById('rPrinciple').value.trim();
  item.size=pickSize;item.cat=pickCat;
  item.review={how:document.getElementById('rHow').value.trim(),opp:document.getElementById('rOpp').value.trim(),worst:document.getElementById('rWorst').value.trim(),result:document.getElementById('rResult').value.trim(),reversible:segVal,score:scoreVal,principle:pTxt};
  const r=item.review;
  item.reviewed=!!(r.how||r.opp||r.worst||r.result||segVal||scoreVal||pTxt||pickSize||pickCat);
  if(pTxt){principles.unshift({id:uid(),ts:Date.now(),text:pTxt,from:item.seed.slice(0,40),cat:pickCat});}
  saveAll();render();closeReview();
  toast(pTxt?'已保存 · 一条原则进库了':'已保存');
});

function del(id){if(!confirm('删除这条记录？删了找不回来。'))return;data=data.filter(d=>d.id!==id);saveAll();render();}
function delP(id){if(!confirm('删除这条原则？'))return;principles=principles.filter(p=>p.id!==id);saveAll();render();}
function sizeTag(s){return s?`<span class="tag size-${s}">${s}决策</span>`:'';}

function render(){
  document.getElementById('statTotal').textContent=data.length;
  document.getElementById('statPending').textContent=data.filter(d=>!d.reviewed).length;
  document.getElementById('statStreak').textContent=streak();
  const list=document.getElementById('list');
  document.getElementById('listCount').textContent=data.length?data.length+' 条':'';
  if(!data.length){
    list.innerHTML='<div class="empty">还没有记录。<br>下次你要做决策时 —— 不管大小 ——<br>点开就说，把它接住。</div>';
  }else{
    list.innerHTML=data.map(d=>{
      const cat=d.cat?`<span class="tag cat">${esc(d.cat)}</span>`:'';
      const status=d.reviewed?`<span class="tag done">已复盘${d.review&&d.review.score?' · 过程 '+d.review.score+'/5':''}</span>`:`<span class="tag pending">待复盘</span>`;
      let reviewHtml='';
      if(d.reviewed&&d.review){
        const r=d.review;const rows=[];
        if(r.how)rows.push(`<div class="qa"><div class="q">判断依据</div><div class="a">${esc(r.how)}</div></div>`);
        if(r.opp)rows.push(`<div class="qa"><div class="q">否决的其他做法（机会成本）</div><div class="a">${esc(r.opp)}</div></div>`);
        if(r.reversible)rows.push(`<div class="qa"><div class="q">可逆性</div><div class="a">${esc(r.reversible)}</div></div>`);
        if(r.worst)rows.push(`<div class="qa"><div class="q">最坏情况</div><div class="a">${esc(r.worst)}</div></div>`);
        if(r.result)rows.push(`<div class="qa result"><div class="q">结果</div><div class="a">${esc(r.result)}</div></div>`);
        if(r.principle)rows.push(`<div class="qa principle"><div class="q">沉淀的原则</div><div class="a">${esc(r.principle)}</div></div>`);
        if(rows.length)reviewHtml=`<div class="review-block">${rows.join('')}</div>`;
      }
      return `<div class="item"><div class="when">${fmt(d.ts)}</div><div class="seed-text">${esc(d.seed)}</div><div class="meta-row">${sizeTag(d.size)}${status}${cat}</div>${reviewHtml}<div class="actions"><button onclick="openReview('${d.id}')">${d.reviewed?'修改复盘':'去复盘 →'}</button><button class="del" onclick="del('${d.id}')">删除</button></div></div>`;
    }).join('');
  }
  const pl=document.getElementById('principleList');
  if(!principles.length){
    pl.innerHTML='<div class="empty">还没有沉淀任何原则。<br>去复盘一个决策时，<br>试着总结出一条你以后能反复用的话。</div>';
  }else{
    pl.innerHTML=principles.map((p,i)=>`<div class="pcard"><button class="pdel" onclick="delP('${p.id}')">删</button><div class="pnum">原则 ${String(principles.length-i).padStart(2,'0')}</div><div class="ptext">${esc(p.text)}</div><div class="pfrom">来自：${esc(p.from)}${p.cat?' · '+esc(p.cat):''}</div></div>`).join('');
  }
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
window.openReview=openReview;window.del=del;window.delP=delP;
render();

// 从主屏幕快捷方式打开时（带 #new），自动聚焦输入框，方便直接按麦克风
if(location.hash==='#new'){setTimeout(()=>{seedInput.focus();},300);}
</script>
</body>
</html>
